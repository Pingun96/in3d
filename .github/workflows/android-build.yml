name: Android Build (APK)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install Dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Build Android APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Copy & Rename APK
        run: |
          mkdir -p Payload
          cp android/app/build/outputs/apk/debug/app-debug.apk Payload/BambuScreen-Android.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BambuScreen-Android
          path: Payload/BambuScreen-Android.apk

      - name: Zip Web Assets for OTA Update
        run: |
          cd dist
          zip -r ../update.zip *
          cd ..

      - name: Create GitHub Release for OTA
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Cập nhật tự động v1.0.${{ github.run_number }}
          files: |
            update.zip
            Payload/BambuScreen-Android.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
