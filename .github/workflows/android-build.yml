name: Android Build (APK)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Build Android APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Copy & Rename APK
        run: |
          mkdir -p Payload
          cp android/app/build/outputs/apk/debug/app-debug.apk Payload/BambuScreen-Android.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BambuScreen-Android
          path: Payload/BambuScreen-Android.apk
